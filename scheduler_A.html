<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예약 스케줄러 v3</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
        rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f8f9fa;
            color: #2c3744;
            overflow: hidden;
        }

        .scheduler-container {
            width: 100vw;
            height: 100vh;
            background: #ffffff;
            display: flex;
            position: relative;
            overflow: hidden;
        }

        .main-schedule {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
        }

        /* 주간 헤더 */
        .week-header {
            background: #ffffff;
            border-bottom: 1px solid #e5e8eb;
            display: flex;
            flex-direction: column;
            z-index: 40;
            flex-shrink: 0;
        }

        .week-info {
            padding: 16px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #e5e8eb;
        }

        .week-title-row {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .week-title {
            font-size: 18px;
            font-weight: 700;
            color: #2c3744;
            margin: 0;
        }

        .week-nav {
            font-size: 20px;
            color: #999;
            cursor: pointer;
            user-select: none;
        }

        .week-capacity {
            font-size: 13px;
            color: #666;
            margin-left: 16px;
        }

        .date-headers {
            display: flex;
            height: 72px;
        }

        .time-column-header {
            width: 80px;
            background: #f8f9fa;
            border-right: 1px solid #e5e8eb;
            flex-shrink: 0;
        }

        .date-column {
            flex: 1;
            border-right: 1px solid #e5e8eb;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 8px 6px;
            gap: 6px;
        }

        .date-column:last-child { border-right: none; }

        .date-text {
            font-size: 13px;
            font-weight: 600;
            color: #2c3744;
            display: flex;
            align-items: baseline;
            gap: 4px;
        }

        .date-text .num {
            font-size: 13px;
            font-weight: 400;
            color: #888;
        }

        .date-column.weekend.red .date-text,
        .date-column.weekend.red .date-text .num { color: #ff6b6b; }

        .date-column.weekend.blue .date-text,
        .date-column.weekend.blue .date-text .num { color: #1976d2; }

        .date-btn-row { display: flex; gap: 4px; }
        .copy-btn {
            padding: 3px 10px;
            font-size: 11px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 4px;
            cursor: pointer;
            color: #555;
        }
        .copy-btn:hover { background: #f8f9fa; }
        .delete-col-btn {
            padding: 4px 8px;
            font-size: 11px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 4px;
            cursor: pointer;
            color: #666;
        }
        .delete-col-btn:hover { background: #fff0f0; color: #e53e3e; border-color: #f5c6c6; }

        .header-right { display: flex; gap: 8px; }

        .header-btn {
            padding: 8px 16px;
            border: 1px solid #dfdfdf;
            background: #ffffff;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 700;
            color: #2c3744;
            cursor: pointer;
        }
        .header-btn:hover { background: #f8f9fa; }

        /* ─── 좌측 사이드바 ─── */
        .left-sidebar {
            width: 280px;
            height: 100%;
            background: #ffffff;
            border-right: 1px solid #e5e8eb;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            z-index: 50;
            overflow-y: auto;
        }

        .clinic-header {
            padding: 16px 20px;
            border-bottom: 1px solid #e5e8eb;
        }

        .clinic-name {
            font-size: 14px;
            font-weight: 600;
            color: #2c3744;
        }

        /* 설정 버튼 */
        .setting-buttons {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
            border-bottom: 1px solid #e5e8eb;
        }

        .setting-btn {
            flex: 1;
            padding: 9px 6px;
            border: 1px solid #dfdfdf;
            background: #ffffff;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            color: #2c3744;
            cursor: pointer;
            font-family: 'Pretendard', sans-serif;
        }
        .setting-btn:hover { background: #f8f9fa; }

        /* 캘린더 */
        .calendar-section {
            padding: 16px 20px;
            border-bottom: 1px solid #e5e8eb;
        }

        .calendar-header {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            position: relative;
        }

        .calendar-nav {
            position: absolute;
            font-size: 16px;
            cursor: pointer;
            color: #666;
        }
        .calendar-nav.prev { left: 0; }
        .calendar-nav.next { right: 0; }

        .calendar-title {
            font-size: 15px;
            font-weight: 700;
            color: #2c3744;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1px;
        }

        .calendar-day-header {
            padding: 4px 2px;
            text-align: center;
            font-size: 12px;
            font-weight: 600;
            color: #666;
        }

        .calendar-day {
            padding: 4px 2px;
            text-align: center;
            font-size: 12px;
            cursor: pointer;
            min-height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
        }
        .calendar-day:hover { background: #f0f7ff; }

        .calendar-day-header.weekend.red,
        .calendar-day.weekend.red { color: #ff6b6b; }

        .calendar-day-header.weekend.blue,
        .calendar-day.weekend.blue { color: #1976d2; }

        .calendar-day.selected-week { background: #FFF8B6; border-radius: 0; }
        .calendar-day.selected-week.sel-start { border-radius: 6px 0 0 6px; }
        .calendar-day.selected-week.sel-end { border-radius: 0 6px 6px 0; }

        .calendar-day.selected { background: #e3f2fd; color: #1976d2; font-weight: 600; }
        .calendar-day.other-month { color: #ccc; }
        .calendar-day.today { font-weight: 700; color: #ff6b6b; }
        .calendar-day.today-label {
            font-size: 10px;
            font-weight: 700;
            color: #ff6b6b;
        }

        /* 예약현황 */
        .appointment-summary {
            padding: 16px 20px;
            flex: 1;
        }

        .summary-week-title {
            font-size: 12px;
            color: #888;
            margin-bottom: 14px;
        }

        .summary-item {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f0f2f4;
            gap: 10px;
        }

        .summary-item:last-of-type { border-bottom: none; }

        .summary-dot {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            flex-shrink: 0;
        }

        .summary-name {
            flex: 1;
            font-size: 14px;
            font-weight: 600;
            color: #2c3744;
        }

        .summary-count {
            font-size: 14px;
            color: #2c3744;
        }

        .summary-total {
            display: flex;
            justify-content: flex-end;
            padding: 10px 0;
            font-size: 14px;
            color: #2c3744;
        }

        /* ─── 스케줄 영역 ─── */
        .schedule-main {
            width: 100%;
            flex: 1;
            overflow-y: auto;
            background: #ffffff;
        }

        .schedule-scroll-inner {
            display: flex;
            width: 100%;
            height: 1440px;
        }

        .time-labels {
            position: relative;
            flex-shrink: 0;
            width: 80px;
            height: 1440px;
            background: #f8f9fa;
            border-right: 1px solid #e5e8eb;
        }

        .time-label {
            position: absolute;
            left: 0;
            width: 80px;
            font-size: 11px;
            color: #666;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .schedule-grid {
            flex: 1;
            position: relative;
            height: 1440px;
            display: flex;
        }

        .day-column {
            flex: 1;
            position: relative;
            border-right: 1px solid #BCC0C6;
            background: #E2E5E8;
            cursor: crosshair;
        }
        .day-column:last-child { border-right: none; }

        .hour-lines {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
        }

        .hour-line {
            position: absolute;
            left: 0; width: 100%; height: 1px;
            background: #BCC0C6;
        }

        .five-minute-line {
            position: absolute;
            left: 0; width: 100%; height: 1px;
            background: #CDD0D4;
        }

        /* 드래그 박스 */
        .drag-box {
            position: absolute;
            left: 8px; right: 8px;
            background: #ffffff;
            border: 1px solid #E5E7EB;
            border-radius: 4px;
            z-index: 20;
            pointer-events: auto;
            font-family: 'Pretendard', sans-serif;
            cursor: move;
        }

        .drag-preview {
            position: absolute;
            background: rgba(0, 0, 0, 0.06);
            border: 1px dashed #999;
            border-radius: 6px;
            z-index: 15;
            pointer-events: none;
        }

        /* ─── 팝업 ─── */
        .appointment-popup {
            position: absolute;
            width: 380px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.14);
            z-index: 2000;
            overflow: hidden;
            font-family: 'Pretendard', sans-serif;
        }

        .popup-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            padding: 20px 20px 4px 20px;
        }

        .popup-date-badge {
            display: inline-block;
            background: #FEF3C7;
            color: #92400E;
            font-size: 14px;
            font-weight: 700;
            padding: 6px 14px;
            border-radius: 20px;
        }

        .popup-close-btn {
            background: none;
            border: none;
            font-size: 18px;
            color: #aaa;
            cursor: pointer;
            padding: 4px;
            line-height: 1;
            margin-top: 2px;
        }
        .popup-close-btn:hover { color: #555; }

        .popup-body {
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .popup-section-label {
            font-size: 14px;
            font-weight: 700;
            color: #2c3744;
            margin-bottom: 10px;
        }

        .time-setting-row {
            display: flex;
            gap: 8px;
        }

        .time-setting-item {
            flex: 1;
            height: 44px;
            background: #ffffff;
            border: 1px solid #E5E7EB;
            border-radius: 8px;
            display: flex;
            align-items: center;
            padding: 0 12px;
            cursor: pointer;
            gap: 6px;
        }
        .time-setting-item:hover { border-color: #c0c0c0; }

        .time-setting-text {
            font-size: 15px;
            font-weight: 500;
            color: #2c3744;
        }

        .time-setting-secondary {
            font-size: 13px;
            color: #9CA3AF;
            flex: 1;
        }

        .custom-select-icon { flex-shrink: 0; }

        /* 체크박스 카드 */
        .treatment-check-cards {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .treatment-check-card {
            border: 1px solid rgba(0,0,0,0.07);
            border-radius: 10px;
            padding: 13px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: border-color 0.15s;
        }
        .treatment-check-card:hover { border-color: rgba(0,0,0,0.15); }
        .treatment-check-card.checked { border-color: rgba(0,0,0,0.12); }

        .treatment-check-card input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #506073;
            cursor: pointer;
            flex-shrink: 0;
        }

        .check-card-label {
            font-size: 14px;
            font-weight: 500;
            color: #2c3744;
        }

        /* 동시 예약 */
        .concurrent-label-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .concurrent-note {
            font-size: 12px;
            color: #9CA3AF;
        }

        .concurrent-radio-group {
            display: flex;
            gap: 20px;
        }

        .radio-item {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .radio-item input[type="radio"] {
            width: 18px;
            height: 18px;
            accent-color: #506073;
            cursor: pointer;
        }

        .radio-item span {
            font-size: 14px;
            color: #2c3744;
        }

        /* 팝업 하단 버튼 영역 */
        .popup-footer {
            padding: 4px 20px 20px;
        }

        .popup-error {
            display: flex;
            align-items: center;
            gap: 4px;
            min-height: 22px;
            margin-bottom: 10px;
            visibility: hidden;
        }

        .popup-error-text {
            font-size: 13px;
            color: #f55251;
        }

        .popup-btn-row {
            display: flex;
            gap: 8px;
        }

        .popup-save-btn {
            flex: 1;
            height: 52px;
            background: #506073;
            color: #ffffff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Pretendard', sans-serif;
            transition: background 0.15s;
        }
        .popup-save-btn:hover { background: #3d4a59; }

        .popup-delete-btn {
            height: 52px;
            padding: 0 18px;
            background: #ffffff;
            color: #f44336;
            border: 1px solid #ffcdd2;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Pretendard', sans-serif;
        }
        .popup-delete-btn:hover { background: #fff5f5; }
    </style>
</head>

<body>
    <div class="scheduler-container">
        <!-- ─── 좌측 사이드바 ─── -->
        <div class="left-sidebar">
            <div class="clinic-header">
                <div class="clinic-name">[김똑닥진료실/소아청소년과]</div>
            </div>

            <!-- 설정 버튼 -->
            <div class="setting-buttons">
                <button class="setting-btn">진료항목 설정</button>
                <button class="setting-btn">운영 시간 설정</button>
            </div>

            <!-- 캘린더 (2025년 9월, 일요일 시작) -->
            <div class="calendar-section">
                <div class="calendar-header">
                    <div class="calendar-nav prev">‹</div>
                    <div class="calendar-title">2025년 9월</div>
                    <div class="calendar-nav next">›</div>
                </div>

                <div class="calendar-grid">
                    <!-- 요일 헤더: 일~토 (일요일 시작) -->
                    <div class="calendar-day-header weekend red">일</div>
                    <div class="calendar-day-header">월</div>
                    <div class="calendar-day-header">화</div>
                    <div class="calendar-day-header">수</div>
                    <div class="calendar-day-header">목</div>
                    <div class="calendar-day-header">금</div>
                    <div class="calendar-day-header weekend blue">토</div>

                    <!-- 1주: 8/31(일) ~ 9/6(토) -->
                    <div class="calendar-day other-month weekend red">31</div>
                    <div class="calendar-day">1</div>
                    <div class="calendar-day">2</div>
                    <div class="calendar-day">3</div>
                    <div class="calendar-day">4</div>
                    <div class="calendar-day">5</div>
                    <div class="calendar-day weekend blue">6</div>

                    <!-- 2주: 9/7(일) ~ 9/13(토) -->
                    <div class="calendar-day weekend red">7</div>
                    <div class="calendar-day today-label">오늘</div>
                    <div class="calendar-day">9</div>
                    <div class="calendar-day">10</div>
                    <div class="calendar-day">11</div>
                    <div class="calendar-day">12</div>
                    <div class="calendar-day weekend blue">13</div>

                    <!-- 3주: 9/14(일) ~ 9/20(토) -->
                    <div class="calendar-day weekend red">14</div>
                    <div class="calendar-day">15</div>
                    <div class="calendar-day">16</div>
                    <div class="calendar-day">17</div>
                    <div class="calendar-day">18</div>
                    <div class="calendar-day">19</div>
                    <div class="calendar-day weekend blue">20</div>

                    <!-- 4주: 9/21(일) ~ 9/27(토) | 22~27 선택 주 -->
                    <div class="calendar-day weekend red">21</div>
                    <div class="calendar-day selected-week sel-start">22</div>
                    <div class="calendar-day selected-week">23</div>
                    <div class="calendar-day selected-week">24</div>
                    <div class="calendar-day selected-week">25</div>
                    <div class="calendar-day selected-week">26</div>
                    <div class="calendar-day selected-week weekend blue">27</div>

                    <!-- 5주: 9/28(일) ~ 9/30(화) | 28 선택 주 -->
                    <div class="calendar-day selected-week sel-end weekend red">28</div>
                    <div class="calendar-day">29</div>
                    <div class="calendar-day">30</div>
                    <div class="calendar-day other-month"></div>
                    <div class="calendar-day other-month"></div>
                    <div class="calendar-day other-month"></div>
                    <div class="calendar-day other-month weekend blue"></div>
                </div>
            </div>

            <!-- 예약현황 -->
            <div class="appointment-summary">
                <div class="summary-week-title">9월 22일 ~ 28일 예약현황</div>
                <div class="summary-item">
                    <span class="summary-dot" style="background:#FECACA;border:1.5px solid #F87171;"></span>
                    <span class="summary-name">일반진료</span>
                    <span class="summary-count">0명</span>
                </div>
                <div class="summary-item">
                    <span class="summary-dot" style="background:#BFDBFE;border:1.5px solid #93C5FD;"></span>
                    <span class="summary-name">발달클리닉</span>
                    <span class="summary-count">0명</span>
                </div>
                <div class="summary-item">
                    <span class="summary-dot" style="background:#9CA3AF;"></span>
                    <span class="summary-name">현장예약</span>
                    <span class="summary-count">0명</span>
                </div>
                <div class="summary-total">
                    <span class="summary-count">0명</span>
                </div>
            </div>
        </div>

        <!-- ─── 메인 영역 ─── -->
        <div class="main-schedule">
            <div class="week-header">

                <div class="date-headers">
                    <div class="time-column-header"></div>
                    <div class="date-column">
                        <div class="date-text">월 <span class="num">9/22</span></div>
                        <div class="date-btn-row"><button class="copy-btn">복사</button><button class="delete-col-btn">삭제</button></div>
                    </div>
                    <div class="date-column">
                        <div class="date-text">화 <span class="num">9/23</span></div>
                        <div class="date-btn-row"><button class="copy-btn">복사</button><button class="delete-col-btn">삭제</button></div>
                    </div>
                    <div class="date-column">
                        <div class="date-text">수 <span class="num">9/24</span></div>
                        <div class="date-btn-row"><button class="copy-btn">복사</button><button class="delete-col-btn">삭제</button></div>
                    </div>
                    <div class="date-column">
                        <div class="date-text">목 <span class="num">9/25</span></div>
                        <div class="date-btn-row"><button class="copy-btn">복사</button><button class="delete-col-btn">삭제</button></div>
                    </div>
                    <div class="date-column">
                        <div class="date-text">금 <span class="num">9/26</span></div>
                        <div class="date-btn-row"><button class="copy-btn">복사</button><button class="delete-col-btn">삭제</button></div>
                    </div>
                    <div class="date-column weekend blue">
                        <div class="date-text">토 <span class="num">9/27</span></div>
                        <div class="date-btn-row"><button class="copy-btn">복사</button><button class="delete-col-btn">삭제</button></div>
                    </div>
                    <div class="date-column weekend red">
                        <div class="date-text">일 <span class="num">9/28</span></div>
                        <div class="date-btn-row"><button class="copy-btn">복사</button><button class="delete-col-btn">삭제</button></div>
                    </div>
                </div>
            </div>

            <div class="schedule-main">
                <div class="schedule-scroll-inner">
                    <div class="time-labels" id="timeLabels"></div>
                    <div class="schedule-grid">
                        <div class="day-column"><div class="hour-lines"></div></div>
                        <div class="day-column"><div class="hour-lines"></div></div>
                        <div class="day-column"><div class="hour-lines"></div></div>
                        <div class="day-column"><div class="hour-lines"></div></div>
                        <div class="day-column"><div class="hour-lines"></div></div>
                        <div class="day-column"><div class="hour-lines"></div></div>
                        <div class="day-column"><div class="hour-lines"></div></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 진료항목별 기준 색상 (RGB)
        const treatmentColorMap = {
            '일반진료':   [248, 113, 113],   // #F87171
            '발달클리닉': [ 96, 165, 250],   // #60A5FA
        };

        // 블럭 색상 결정 (opacity 기반)
        function getBlockStyle(treatments, hover = false) {
            const colors = (treatments || []).map(t => treatmentColorMap[t]).filter(Boolean);

            if (colors.length === 1) {
                const [r, g, b] = colors[0];
                const bgA = hover ? 0.5 : 0.4;
                const bdA = hover ? 0.7 : 0.6;
                return {
                    bg:        `rgba(${r},${g},${b},${bgA})`,
                    border:    `rgba(${r},${g},${b},${bdA})`,
                    indicator: 'rgba(255,255,255,0.9)'
                };
            }
            // 0개 또는 2개 이상 → 흰색
            const a = hover ? 0.7 : 0.6;
            return {
                bg:        `rgba(255,255,255,${a})`,
                border:    `rgba(200,205,212,${a})`,
                indicator: '#C9CDD4'
            };
        }

        // 블럭 색상 적용
        function applyBlockColor(dragBox, hover = false) {
            let treatments = [];
            try { treatments = JSON.parse(dragBox.dataset.treatments || '[]'); } catch(e) {}
            const s = getBlockStyle(treatments, hover);
            dragBox.style.background   = s.bg;
            dragBox.style.borderColor  = s.border;
            return s;
        }

        // 진료항목 데이터
        const treatmentData = [
            { name: '일반진료', duration: 10 },
            { name: '발달클리닉', duration: 30 }
        ];

        // 드래그 상태
        let isDragging = false;
        let dragStartY = 0;
        let dragStartX = 0;
        let currentColumn = null;
        let dragPreview = null;
        let dragStartTime = 0;
        let hasMoved = false;

        // 블럭 이동 상태
        let isMovingBlock = false;
        let movingBlock = null;
        let movePreview = null;
        let originalPosition = null;

        function snapToFiveMinutes(pixels) {
            return Math.round(pixels / 10) * 10;
        }

        function contentPixelsToMinutes(pixels) {
            return Math.max(0, Math.min(snapToFiveMinutes(pixels) / 2, 720));
        }

        function minutesToTime(minutes) {
            const hours = Math.floor(minutes / 60) + 9;
            const mins = minutes % 60;
            const h = Math.min(hours, 21);
            const m = h === 21 ? 0 : mins;
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
        }

        function timeToContentPixels(timeString) {
            const [h, m] = timeString.split(':').map(Number);
            const lh = Math.min(h, 21);
            const lm = lh === 21 ? 0 : m;
            return ((lh - 9) * 60 + lm) * 2;
        }

        function pixelsToDuration(pixels) {
            return Math.max(5, snapToFiveMinutes(pixels) / 2);
        }

        function generateTimeLabels() {
            const container = document.getElementById('timeLabels');
            container.innerHTML = '';
            for (let i = 0; i <= 24; i++) {
                const mins = i * 30;
                const el = document.createElement('div');
                el.className = 'time-label';
                el.style.top = (mins * 2) + 'px';
                el.textContent = minutesToTime(mins);
                container.appendChild(el);
            }
        }

        function generateGridLines() {
            document.querySelectorAll('.day-column').forEach(col => {
                const hl = col.querySelector('.hour-lines');
                if (!hl) return;
                hl.innerHTML = '';
                for (let m = 0; m <= 720; m += 5) {
                    const line = document.createElement('div');
                    line.className = m % 60 === 0 ? 'hour-line' : 'five-minute-line';
                    line.style.top = (m * 2) + 'px';
                    hl.appendChild(line);
                }
            });
        }

        function checkOverlap(column, newTop, newHeight, excludeBlock = null) {
            const newBottom = newTop + newHeight;
            for (let block of column.querySelectorAll('.drag-box')) {
                if (excludeBlock && block === excludeBlock) continue;
                const bt = parseInt(block.style.top);
                const bb = bt + parseInt(block.style.height);
                if ((newTop >= bt && newTop < bb) || (newBottom > bt && newBottom <= bb) || (newTop <= bt && newBottom >= bb)) return true;
            }
            return false;
        }

        function updateBlockContent(dragBox, height) {
            dragBox.innerHTML = '';

            // 색상 적용 (normal 상태)
            const style = applyBlockColor(dragBox, false);

            if (height <= 10) return;

            if (height >= 12) {
                const indicator = document.createElement('div');
                indicator.style.cssText = `position:absolute;bottom:6px;left:50%;transform:translateX(-50%);width:22px;height:2px;background:${style.indicator};border-radius:19px;pointer-events:none;`;

                const resizeArea = document.createElement('div');
                resizeArea.className = 'resize-handle';
                resizeArea.style.cssText = 'position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:30px;height:14px;cursor:ns-resize;pointer-events:auto;z-index:100;';

                let isResizing = false;
                let resizePreview = null;

                resizeArea.addEventListener('mousedown', function (e) {
                    e.stopPropagation();
                    e.preventDefault();
                    isResizing = true;
                    const startHeight = parseInt(dragBox.style.height);
                    const startY = e.clientY;
                    const column = dragBox.parentElement;
                    const currentTop = parseInt(dragBox.style.top);

                    resizePreview = document.createElement('div');
                    resizePreview.style.cssText = `position:absolute;left:8px;right:8px;top:${currentTop}px;height:${startHeight}px;background:rgba(0,0,0,0.06);border:2px dashed #999;border-radius:4px;z-index:999;pointer-events:none;`;
                    column.appendChild(resizePreview);
                    dragBox.style.opacity = '0.5';

                    function handleResize(e) {
                        if (!isResizing) return;
                        const newH = Math.max(10, snapToFiveMinutes(startHeight + e.clientY - startY));
                        const overlap = checkOverlap(column, currentTop, newH, dragBox);
                        resizePreview.style.height = newH + 'px';
                        resizePreview.style.background = overlap ? 'rgba(244,67,54,0.3)' : 'rgba(0,0,0,0.06)';
                        resizePreview.style.borderColor = overlap ? '#f44336' : '#999';
                    }

                    function stopResize() {
                        if (!isResizing) return;
                        isResizing = false;
                        let finalH = startHeight;
                        if (resizePreview) {
                            const ph = parseInt(resizePreview.style.height);
                            if (!checkOverlap(column, currentTop, ph, dragBox)) {
                                finalH = ph;
                                dragBox.style.height = finalH + 'px';
                                const sm = contentPixelsToMinutes(currentTop);
                                dragBox.dataset.startTime = minutesToTime(sm);
                                dragBox.dataset.endTime = minutesToTime(sm + pixelsToDuration(finalH));
                            }
                            column.removeChild(resizePreview);
                            resizePreview = null;
                        }
                        dragBox.style.opacity = '1';
                        updateBlockContent(dragBox, finalH);
                        if (dragBox.updatePopupTimes) dragBox.updatePopupTimes();
                        document.removeEventListener('mousemove', handleResize);
                        document.removeEventListener('mouseup', stopResize);
                    }

                    document.addEventListener('mousemove', handleResize);
                    document.addEventListener('mouseup', stopResize);
                });

                dragBox.appendChild(indicator);
                dragBox.appendChild(resizeArea);
            }
        }

        // 날짜 텍스트
        function getDateText(columnIndex) {
            const days = ['월', '화', '수', '목', '금', '토', '일'];
            const cols = document.querySelectorAll('.date-column');
            const weekTitle = document.querySelector('.week-title')?.textContent || '';
            const m = weekTitle.match(/(\d+)월/);
            const month = m ? m[1] : '9';
            const num = cols[columnIndex]?.querySelector('.num')?.textContent || '';
            return `${month}월 ${num}일 (${days[columnIndex]})`;
        }

        // 예약 블럭 생성
        function createAppointmentBlock(column, columnIndex, top, height, title = '새 예약') {
            if (checkOverlap(column, top, height, null)) return null;
            const sm = contentPixelsToMinutes(top);
            const dur = pixelsToDuration(height);
            const startTime = minutesToTime(sm);
            const endTime = minutesToTime(sm + dur);

            const dragBox = document.createElement('div');
            dragBox.className = 'drag-box';
            dragBox.style.top = top + 'px';
            dragBox.style.height = height + 'px';
            dragBox.dataset.startTime = startTime;
            dragBox.dataset.endTime = endTime;
            dragBox.dataset.dayIndex = columnIndex;
            dragBox.dataset.title = title;
            dragBox.dataset.treatments = JSON.stringify(treatmentData.map(t => t.name));
            dragBox.dataset.concurrent = '1';

            updateBlockContent(dragBox, height);

            // hover 색상 (opacity 스펙 적용)
            dragBox.addEventListener('mouseenter', function () {
                if (!isMovingBlock) applyBlockColor(dragBox, true);
            });
            dragBox.addEventListener('mouseleave', function () {
                if (!isMovingBlock) applyBlockColor(dragBox, false);
            });

            dragBox.addEventListener('click', function (e) {
                if (e.target.classList.contains('resize-handle')) return;
                if (hasMoved) return;
                showPopup(dragBox, true);
            });

            dragBox.addEventListener('mousedown', function (e) {
                if (e.target.classList.contains('resize-handle')) return;
                e.preventDefault();
                e.stopPropagation();
                isMovingBlock = true;
                movingBlock = dragBox;
                hasMoved = false;
                originalPosition = { top: parseInt(dragBox.style.top), column: dragBox.parentElement, columnIndex: parseInt(dragBox.dataset.dayIndex) };
                const rect = dragBox.getBoundingClientRect();
                const cr = dragBox.parentElement.getBoundingClientRect();
                dragStartY = e.clientY - rect.top;
                dragStartX = e.clientX - cr.left;
                dragBox.style.opacity = '0.5';
                dragBox.style.zIndex = '1000';
                movePreview = document.createElement('div');
                movePreview.className = 'drag-preview';
                movePreview.style.cssText = `position:absolute;left:8px;right:8px;height:${dragBox.style.height};background:rgba(0,0,0,0.06);border:2px dashed #999;border-radius:4px;z-index:999;pointer-events:none;display:none;`;
            });

            column.appendChild(dragBox);
            return dragBox;
        }

        // ─── 팝업 ───
        function showPopup(block = null, isEdit = false) {
            document.querySelector('.appointment-popup')?.remove();

            const popup = document.createElement('div');
            popup.className = 'appointment-popup';

            let startTime = '09:00', endTime = '09:30', dayIndex = 0;
            let checkedTreatments = treatmentData.map(t => t.name);
            let concurrentCount = 1;

            if (block) {
                startTime = block.dataset.startTime || startTime;
                endTime = block.dataset.endTime || endTime;
                dayIndex = parseInt(block.dataset.dayIndex) || 0;
                try { checkedTreatments = JSON.parse(block.dataset.treatments || '[]'); } catch(e) {}
                if (!checkedTreatments.length) checkedTreatments = treatmentData.map(t => t.name);
                concurrentCount = parseInt(block.dataset.concurrent || '1');
            }

            const dateText = getDateText(dayIndex);
            const rName = 'cr_' + Date.now();

            popup.innerHTML = `
                <div class="popup-top">
                    <span class="popup-date-badge">${dateText}</span>
                    <button class="popup-close-btn">✕</button>
                </div>
                <div class="popup-body">
                    <div>
                        <div class="popup-section-label">설정 시간</div>
                        <div class="time-setting-row">
                            <div class="time-setting-item" data-field="start-time">
                                <span class="time-setting-text">${startTime}</span>
                                <span class="time-setting-secondary">부터</span>
                                <svg class="custom-select-icon" width="16" height="16" viewBox="0 0 20 20" fill="none">
                                    <path d="M5 7.5L10 12.5L15 7.5" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </div>
                            <div class="time-setting-item" data-field="end-time">
                                <span class="time-setting-text">${endTime}</span>
                                <span class="time-setting-secondary">까지</span>
                                <svg class="custom-select-icon" width="16" height="16" viewBox="0 0 20 20" fill="none">
                                    <path d="M5 7.5L10 12.5L15 7.5" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </div>
                        </div>
                    </div>

                    <div>
                        <div class="popup-section-label">예약 가능 진료항목</div>
                        <div class="treatment-check-cards">
                            ${treatmentData.map(t => `
                                <label class="treatment-check-card ${checkedTreatments.includes(t.name) ? 'checked' : ''}">
                                    <input type="checkbox" name="treatment_item" value="${t.name}" ${checkedTreatments.includes(t.name) ? 'checked' : ''}>
                                    <span class="check-card-label">${t.name} ${t.duration}분</span>
                                </label>
                            `).join('')}
                        </div>
                    </div>

                    <div>
                        <div class="concurrent-label-row">
                            <div class="popup-section-label" style="margin-bottom:0;">동시 예약</div>
                            <span class="concurrent-note">같은 예약 시간에 여러 명을 받을 수 있어요.</span>
                        </div>
                        <div class="concurrent-radio-group">
                            ${[1,2,3].map(n => `
                                <label class="radio-item">
                                    <input type="radio" name="${rName}" value="${n}" ${concurrentCount === n ? 'checked' : ''}>
                                    <span>${n}명</span>
                                </label>
                            `).join('')}
                        </div>
                    </div>
                </div>

                <div class="popup-footer">
                    <div class="popup-error" id="popupError">
                        <span class="popup-error-text" id="popupErrorText"></span>
                    </div>
                    <div class="popup-btn-row">
                        ${isEdit ? '<button class="popup-delete-btn" id="deleteBtn">삭제</button>' : ''}
                        <button class="popup-save-btn" id="saveBtn">저장</button>
                    </div>
                </div>
            `;

            // 위치 지정
            if (block) {
                const br = block.getBoundingClientRect();
                const cr = document.querySelector('.scheduler-container').getBoundingClientRect();
                const pw = 380, ph = 480;
                let left = br.right - cr.left + 10;
                let top = br.top - cr.top;
                if (left + pw > cr.width) left = br.left - cr.left - pw - 10;
                if (top + ph > cr.height) top = Math.max(0, cr.height - ph - 10);
                popup.style.left = Math.max(0, left) + 'px';
                popup.style.top = Math.max(0, top) + 'px';
            } else {
                popup.style.left = '50%';
                popup.style.top = '50%';
                popup.style.transform = 'translate(-50%,-50%)';
            }

            document.querySelector('.scheduler-container').appendChild(popup);

            let curStart = startTime, curEnd = endTime;

            // 팝업 시간 동기화
            if (block) {
                block.updatePopupTimes = function () {
                    curStart = block.dataset.startTime;
                    curEnd = block.dataset.endTime;
                    popup.querySelector('[data-field="start-time"] .time-setting-text').textContent = curStart;
                    popup.querySelector('[data-field="end-time"] .time-setting-text').textContent = curEnd;
                };
            }

            // 체크박스 카드 스타일 토글
            popup.querySelectorAll('.treatment-check-card').forEach(card => {
                card.querySelector('input').addEventListener('change', function () {
                    card.classList.toggle('checked', this.checked);
                });
            });

            function closePopup() {
                document.removeEventListener('keydown', onKey);
                document.removeEventListener('click', onOutside);
                if (block && block.updatePopupTimes) delete block.updatePopupTimes;
                popup.remove();
            }

            function cancelPopup() {
                if (!isEdit && block) block.remove();
                closePopup();
            }

            // 시간 피커
            popup.querySelector('[data-field="start-time"]').addEventListener('click', function () {
                const t = prompt('시작 시간 (HH:MM)', curStart);
                if (t && /^\d{2}:\d{2}$/.test(t)) {
                    const [h, m] = t.split(':').map(Number);
                    if (h >= 8 && h <= 21 && m >= 0 && m < 60) {
                        curStart = t;
                        this.querySelector('.time-setting-text').textContent = t;
                    }
                }
            });

            popup.querySelector('[data-field="end-time"]').addEventListener('click', function () {
                const t = prompt('종료 시간 (HH:MM)', curEnd);
                if (t && /^\d{2}:\d{2}$/.test(t)) {
                    const [h, m] = t.split(':').map(Number);
                    if (h >= 8 && h <= 21 && m >= 0 && m < 60) {
                        curEnd = t;
                        this.querySelector('.time-setting-text').textContent = t;
                    }
                }
            });

            popup.querySelector('.popup-close-btn').addEventListener('click', cancelPopup);
            popup.addEventListener('click', e => e.stopPropagation());
            popup.addEventListener('mousedown', e => e.stopPropagation());

            function onOutside(e) { if (!popup.contains(e.target)) cancelPopup(); }
            function onKey(e) { if (e.key === 'Escape') cancelPopup(); }
            document.addEventListener('keydown', onKey);
            setTimeout(() => document.addEventListener('click', onOutside), 100);

            const deleteBtn = popup.querySelector('#deleteBtn');
            if (deleteBtn) {
                deleteBtn.addEventListener('click', () => { block?.remove(); closePopup(); });
            }

            popup.querySelector('#saveBtn').addEventListener('click', function () {
                if (curStart >= curEnd) {
                    popup.querySelector('#popupError').style.visibility = 'visible';
                    popup.querySelector('#popupErrorText').textContent = '종료 시간이 시작 시간보다 늦어야 합니다.';
                    return;
                }
                const selected = [...popup.querySelectorAll('input[name="treatment_item"]:checked')].map(el => el.value);
                if (!selected.length) {
                    popup.querySelector('#popupError').style.visibility = 'visible';
                    popup.querySelector('#popupErrorText').textContent = '진료항목을 하나 이상 선택해주세요.';
                    return;
                }
                const concurrent = parseInt(popup.querySelector(`input[name="${rName}"]:checked`)?.value || '1');
                if (block) {
                    const newTop = timeToContentPixels(curStart);
                    const newH = Math.max(10, timeToContentPixels(curEnd) - newTop);
                    block.style.top = newTop + 'px';
                    block.style.height = newH + 'px';
                    block.dataset.startTime = curStart;
                    block.dataset.endTime = curEnd;
                    block.dataset.title = selected[0];
                    block.dataset.treatments = JSON.stringify(selected);
                    block.dataset.concurrent = String(concurrent);
                    updateBlockContent(block, newH);
                }
                closePopup();
            });
        }

        // ─── 그리드 호버 미리보기 ───
        const hoverPreview = document.createElement('div');
        hoverPreview.className = 'drag-preview';
        hoverPreview.style.display = 'none';
        hoverPreview.style.left = '8px';
        hoverPreview.style.right = '8px';
        hoverPreview.style.height = '20px';
        hoverPreview.style.pointerEvents = 'none';

        document.querySelectorAll('.day-column').forEach((column) => {
            column.addEventListener('mousemove', function (e) {
                if (isDragging || isMovingBlock) return;
                if (e.target !== column && !e.target.classList.contains('hour-lines') && !e.target.classList.contains('hour-line') && !e.target.classList.contains('five-minute-line')) {
                    hoverPreview.style.display = 'none';
                    return;
                }
                const rect = column.getBoundingClientRect();
                const y = snapToFiveMinutes(e.clientY - rect.top);
                if (hoverPreview.parentElement !== column) {
                    hoverPreview.parentElement?.removeChild(hoverPreview);
                    column.appendChild(hoverPreview);
                }
                hoverPreview.style.top = y + 'px';
                hoverPreview.style.display = 'block';
            });
            column.addEventListener('mouseleave', function () {
                hoverPreview.style.display = 'none';
            });
        });

        // ─── 그리드 드래그 ───
        document.querySelectorAll('.day-column').forEach((column, columnIndex) => {
            column.addEventListener('mousedown', function (e) {
                if (isMovingBlock) return;
                hoverPreview.style.display = 'none';
                if (e.target !== column && !e.target.classList.contains('hour-lines') && !e.target.classList.contains('hour-line') && !e.target.classList.contains('five-minute-line')) return;

                e.preventDefault();
                isDragging = true;
                currentColumn = column;
                dragStartTime = Date.now();
                hasMoved = false;

                const rect = column.getBoundingClientRect();
                dragStartY = snapToFiveMinutes(e.clientY - rect.top);

                dragPreview = document.createElement('div');
                dragPreview.className = 'drag-preview';
                dragPreview.style.left = '8px';
                dragPreview.style.right = '8px';
                dragPreview.style.top = dragStartY + 'px';
                dragPreview.style.height = '10px';
                column.appendChild(dragPreview);
            });

            column.addEventListener('mousemove', function (e) {
                if (!isDragging || currentColumn !== column) return;
                e.preventDefault();
                const rect = column.getBoundingClientRect();
                const curY = snapToFiveMinutes(e.clientY - rect.top);
                if (Math.abs(curY - dragStartY) > 10) hasMoved = true;
                if (dragPreview) {
                    dragPreview.style.top = Math.min(dragStartY, curY) + 'px';
                    dragPreview.style.height = Math.max(10, Math.abs(curY - dragStartY)) + 'px';
                }
            });

            column.addEventListener('mouseup', function (e) {
                if (!isDragging || currentColumn !== column) return;
                e.preventDefault();
                const dur = Date.now() - dragStartTime;
                const treatmentName = document.querySelector('.treatment-item-box.selected .treatment-name')?.textContent || treatmentData[0].name;

                if (!hasMoved && dur < 200) {
                    const nb = createAppointmentBlock(column, columnIndex, dragStartY, 10, treatmentName);
                    if (nb) setTimeout(() => showPopup(nb, false), 80);
                } else {
                    const rect = column.getBoundingClientRect();
                    const endY = snapToFiveMinutes(e.clientY - rect.top);
                    const top = Math.min(dragStartY, endY);
                    const height = Math.max(10, Math.abs(endY - dragStartY));
                    const nb = createAppointmentBlock(column, columnIndex, top, height, treatmentName);
                    if (nb) setTimeout(() => showPopup(nb, false), 80);
                }

                if (dragPreview) { dragPreview.remove(); dragPreview = null; }
                isDragging = false;
                currentColumn = null;
                hasMoved = false;
            });
        });

        // 전역 mousemove / mouseup
        document.addEventListener('mousemove', function (e) {
            if (isMovingBlock && movingBlock) {
                e.preventDefault();
                hasMoved = true;
                const cols = document.querySelectorAll('.day-column');
                let tc = null;
                for (let i = 0; i < cols.length; i++) {
                    const r = cols[i].getBoundingClientRect();
                    if (e.clientX >= r.left && e.clientX <= r.right) { tc = cols[i]; break; }
                }
                if (tc) {
                    const r = tc.getBoundingClientRect();
                    const newTop = Math.max(0, snapToFiveMinutes(e.clientY - r.top - dragStartY));
                    const bh = parseInt(movingBlock.style.height);
                    if (newTop + bh <= (21 - 9) * 60 * 2) {
                        if (movePreview.parentElement !== tc) {
                            movePreview.parentElement?.removeChild(movePreview);
                            tc.appendChild(movePreview);
                        }
                        movePreview.style.top = newTop + 'px';
                        movePreview.style.display = 'block';
                        const ov = checkOverlap(tc, newTop, bh, movingBlock);
                        movePreview.style.background = ov ? 'rgba(244,67,54,0.3)' : 'rgba(0,0,0,0.06)';
                        movePreview.style.borderColor = ov ? '#f44336' : '#999';
                    } else {
                        movePreview.style.display = 'none';
                    }
                } else if (movePreview) {
                    movePreview.style.display = 'none';
                }
                return;
            }
            if (!isDragging || !currentColumn || !dragPreview) return;
            const rect = currentColumn.getBoundingClientRect();
            const rawY = e.clientY - rect.top;
            if (rawY < 0 || rawY > rect.height) return;
            const curY = snapToFiveMinutes(rawY);
            if (Math.abs(curY - dragStartY) > 10) hasMoved = true;
            dragPreview.style.top = Math.min(dragStartY, curY) + 'px';
            dragPreview.style.height = Math.max(10, Math.abs(curY - dragStartY)) + 'px';
        });

        document.addEventListener('mouseup', function (e) {
            if (isMovingBlock && movingBlock) {
                e.preventDefault();
                if (movePreview && movePreview.style.display === 'block') {
                    const tc = movePreview.parentElement;
                    const newTop = parseInt(movePreview.style.top);
                    const bh = parseInt(movingBlock.style.height);
                    if (!checkOverlap(tc, newTop, bh, movingBlock)) {
                        const tci = Array.from(document.querySelectorAll('.day-column')).indexOf(tc);
                        if (movingBlock.parentElement !== tc) { movingBlock.parentElement.removeChild(movingBlock); tc.appendChild(movingBlock); }
                        movingBlock.style.top = newTop + 'px';
                        movingBlock.dataset.dayIndex = tci;
                        const sm = contentPixelsToMinutes(newTop);
                        movingBlock.dataset.startTime = minutesToTime(sm);
                        movingBlock.dataset.endTime = minutesToTime(sm + pixelsToDuration(bh));
                        updateBlockContent(movingBlock, bh);
                        if (movingBlock.updatePopupTimes) movingBlock.updatePopupTimes();
                    }
                }
                movingBlock.style.opacity = '1';
                movingBlock.style.zIndex = '20';
                movePreview?.parentElement?.removeChild(movePreview);
                movePreview = null;
                isMovingBlock = false;
                movingBlock = null;
                originalPosition = null;
                hasMoved = false;
                return;
            }
            if (isDragging) {
                dragPreview?.remove();
                dragPreview = null;
                isDragging = false;
                currentColumn = null;
                hasMoved = false;
            }
        });

        function syncHeaderPadding() {
            const sm = document.querySelector('.schedule-main');
            const dh = document.querySelector('.date-headers');
            if (sm && dh) dh.style.paddingRight = (sm.offsetWidth - sm.clientWidth) + 'px';
        }

        window.addEventListener('resize', syncHeaderPadding);
        generateTimeLabels();
        generateGridLines();
        syncHeaderPadding();
    </script>
</body>
</html>
